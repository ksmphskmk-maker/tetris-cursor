<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테트리스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-container">
    <h1 class="title">테트리스</h1>

    <div class="game-layout">
      <!-- 게임 보드 (10열 x 20행 CSS Grid) -->
      <section class="board-section" aria-label="게임 보드">
        <div id="game-board" class="board-grid"></div>
        <p id="game-over" class="game-over" hidden>게임 오버</p>
      </section>

      <!-- 점수, 버튼, 조작법 -->
      <aside class="info-section">
        <div class="score-panel">
          <h2>점수</h2>
          <p id="score" class="score-value">0</p>
        </div>

        <div class="button-group">
          <button id="start-btn" type="button">시작</button>
          <button id="restart-btn" type="button" disabled>재시작</button>
        </div>

        <div class="controls-panel controls-desktop">
          <h2>조작법 (키보드)</h2>
          <ul class="controls-list">
            <li><kbd>←</kbd> <kbd>→</kbd> 좌우 이동</li>
            <li><kbd>↓</kbd> 빠르게 내리기</li>
            <li><kbd>↑</kbd> 블록 회전</li>
            <li><kbd>Space</kbd> 즉시 낙하</li>
          </ul>
        </div>
      </aside>
    </div>

    <!-- 모바일 터치 조작 -->
    <div class="touch-controls" aria-label="터치 조작">
      <div class="touch-row">
        <button type="button" class="touch-btn" data-action="left" aria-label="왼쪽">←</button>
        <button type="button" class="touch-btn touch-btn-rotate" data-action="rotate" aria-label="회전">↻</button>
        <button type="button" class="touch-btn" data-action="right" aria-label="오른쪽">→</button>
      </div>
      <div class="touch-row">
        <button type="button" class="touch-btn touch-btn-down" data-action="down" aria-label="아래">↓</button>
        <button type="button" class="touch-btn touch-btn-drop" data-action="drop" aria-label="즉시 낙하">낙하</button>
      </div>
      <p class="touch-hint">화면 버튼으로 블록을 조작하세요</p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
