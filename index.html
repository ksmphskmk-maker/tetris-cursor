<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테트리스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-container">
    <h1 class="title">테트리스</h1>

    <div class="game-layout">
      <!-- 게임 보드 (10열 x 20행 CSS Grid) -->
      <section class="board-section" aria-label="게임 보드">
        <div id="game-board" class="board-grid"></div>
        <p id="game-over" class="game-over" hidden>게임 오버</p>
      </section>

      <!-- 점수, 버튼, 조작법 -->
      <aside class="info-section">
        <div class="score-panel">
          <h2>점수</h2>
          <p id="score" class="score-value">0</p>
        </div>

        <div class="button-group">
          <button id="start-btn" type="button">시작</button>
          <button id="restart-btn" type="button" disabled>재시작</button>
        </div>

        <div class="controls-panel">
          <h2>조작법</h2>
          <ul class="controls-list">
            <li><kbd>←</kbd> ArrowLeft — 왼쪽 이동</li>
            <li><kbd>→</kbd> ArrowRight — 오른쪽 이동</li>
            <li><kbd>↓</kbd> ArrowDown — 한 칸 빠르게 내리기</li>
            <li><kbd>↑</kbd> ArrowUp — 블록 회전</li>
            <li><kbd>Space</kbd> — 즉시 낙하 (hard drop)</li>
          </ul>
        </div>
      </aside>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
